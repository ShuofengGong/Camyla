# Agent Model Configuration
# 
# This file defines the LLM model to use for each agent in the Camyla system.
# 
# Format:
#   AgentClassName:
#     model: "model-identifier"
#     temperature: 0.7  # optional, defaults to 0.7
# 
# See https://openrouter.ai/models for full list

# Part 1: Idea Generation Agents
PaperSummaryAgent:
  model: "google/gemini-3-flash-preview"  # Good at extracting structured information
  temperature: 0.3  # Lower temperature for more focused extraction

DatasetMetadataAgent:
  model: "google/gemini-3-flash-preview"  # Good at extracting structured metadata from papers
  temperature: 0.3  # Lower temperature for precise extraction and JSON generation

IdeaRefineAgent:
  model: "google/gemini-3-flash-preview"  # Excellent at reasoning and synthesis
  temperature: 0.5

IdeaGenerationAgent:
  model: "google/gemini-3-flash-preview"  # Creative ideation
  temperature: 0.8  # Higher temperature for creativity

IdeaVerificationAgent:
  model: "google/gemini-3-flash-preview"  # Thorough validation
  temperature: 0.4

# Part 2: Analysis Agents
ResultAnalysisAgent:
  model: "google/gemini-3-flash-preview"  # Strong analytical capabilities
  temperature: 0.5

# Part 3: Writing Agents
PaperWritingAgent:
  model: "deepseek/deepseek-v3.2"  # Excellent at structured academic writing
  temperature: 0.6

BibtexAgent:
  model: "google/gemini-3-flash-preview"  # Fast for citation lookup and formatting
  temperature: 0.3

SectionAgent:
  model: "deepseek/deepseek-v3.2"  # Good at section-level writing
  temperature: 0.6

ReviewAgent:
  model: "deepseek/deepseek-v3.2"  # Critical review capabilities
  temperature: 0.5

MetadataAgent:
  model: "deepseek/deepseek-v3.2"  # Simple metadata extraction
  temperature: 0.2

OutlineAgent:
  model: "deepseek/deepseek-v3.2"  # Structured outline planning
  temperature: 0.5

SubsectionAgent:
  model: "deepseek/deepseek-v3.2"  # Detailed subsection writing
  temperature: 0.6

# Mock/Testing Agents
MockExperimentAgent:
  model: "google/gemini-3-flash-preview"  # Fast generation for testing
  temperature: 0.7

MockAblationAgent:
  model: "google/gemini-3-flash-preview"  # Fast generation for testing
  temperature: 0.7

# Default configuration (fallback for any agent not specified above)
default:
  model: "deepseek/deepseek-v3.2"
  temperature: 0.7

# Plot Generation Agent
PlotAgent:
  model: "deepseek/deepseek-v3.2"
  temperature: 0.6
